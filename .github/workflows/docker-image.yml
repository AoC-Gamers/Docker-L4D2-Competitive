name: Construcción y Publicación de Imagen Docker

run-name: >-
  Docker Competitive (${{
    github.event_name == 'workflow_dispatch' &&
    format('{0}/{1}', github.event.inputs.trigger_source || 'manual', github.event.inputs.trigger_channel || github.ref_name) ||
    format('push/{0}', github.ref_name)
  }})

on:
  workflow_dispatch:
    inputs:
      trigger_source:
        description: Repo o flujo que disparo esta ejecucion
        required: false
        default: manual
      trigger_channel:
        description: Canal esperado (develop o latest)
        required: false
        default: manual
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener el repositorio
        uses: actions/checkout@v3

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Iniciar sesión en GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Construir y publicar imagen Docker para develop
        if: ${{ github.ref == 'refs/heads/develop' }}
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/aoc-gamers/lgsm-l4d2-competitive:develop

      - name: Construir y publicar imagen Docker para main
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/aoc-gamers/lgsm-l4d2-competitive:latest

      - name: Activar Workflow AoC para develop
        if: ${{ github.ref == 'refs/heads/develop' }}
        run: |
          curl --fail --silent --show-error -X POST \
            https://api.github.com/repos/AoC-Gamers/Docker-L4D2-AoC/actions/workflows/docker-image.yml/dispatches \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.TOKEN_WEBHOOK }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{"ref":"develop","inputs":{"trigger_source":"docker-l4d2-competitive","trigger_channel":"develop"}}'

      - name: Activar Workflow AoC para main
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          curl --fail --silent --show-error -X POST \
            https://api.github.com/repos/AoC-Gamers/Docker-L4D2-AoC/actions/workflows/docker-image.yml/dispatches \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.TOKEN_WEBHOOK }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{"ref":"main","inputs":{"trigger_source":"docker-l4d2-competitive","trigger_channel":"latest"}}'
