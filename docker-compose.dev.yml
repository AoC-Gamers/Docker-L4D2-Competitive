name: ${DEV_COMPOSE_PROJECT_NAME:-docker-l4d2-competitive-dev}

services:
  dev_comp:
    build:
      dockerfile: Dockerfile
      context: .
    image: dev_comp
    container_name: ${DEV_COMP_CONTAINER_NAME:-dev_comp}
    pull_policy: always
    env_file:
      - .env
      - .env.secrets
    volumes:
      - dev_comp_data:/data
    environment:
      - SSH_PORT=${SSH_PORT:-422}
      - SSH_KEY=${SSH_KEY}
      - L4D2_NO_INSTALL=${L4D2_NO_INSTALL:-true}
      - L4D2_NO_AUTOSTART=${L4D2_NO_AUTOSTART:-true}
      - L4D2_NO_UPDATER=${L4D2_NO_UPDATER:-true}
      - STACK_PROFILE=${STACK_PROFILE:-latest}
    ports:
      - "27015:27015"
      - "27115:27115"
      - "${SSH_PORT:-422}:${SSH_PORT:-422}"

volumes:
  dev_comp_data:
    name: ${DEV_COMP_DATA_VOLUME_NAME:-dev_comp_data}