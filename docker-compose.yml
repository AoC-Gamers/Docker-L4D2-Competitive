name: ${PROJECT_NAME:-docker-l4d2-competitive}

services:
  l4d2:
    image: ghcr.io/aoc-gamers/lgsm-l4d2-competitive:${IMAGE_TAG:-latest}
    restart: unless-stopped
    container_name: ${CONTAINER_NAME:-l4d2}
    pull_policy: always
    env_file:
      - .env
      - .env.secrets
    volumes:
      - data:/data
      - ${HOST_REPO_RESOURCES_DIR:-./resources}:${REPO_RESOURCES_DIR:-/data/resources}:ro
    environment:
      - SSH_PORT=${SSH_PORT:-422}
      - SSH_KEY=${SSH_KEY}
      - STACK_PROFILE=${STACK_PROFILE:-default}
    network_mode: host

volumes:
  data:
    name: ${DATA_VOLUME_NAME:-l4d2_data}
